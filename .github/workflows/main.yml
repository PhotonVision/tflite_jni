name: Build rubik_java

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v4
  build:
    runs-on: ubuntu-24.04-arm
    needs: [validation]
    strategy:
      fail-fast: false
      matrix:
        include:
          - build-type: Release
            publish-type: ""
            extra-cmake-args: ""
            jar-name: "Release"
          - build-type: Debug
            publish-type: "debug"
            extra-cmake-args: ""
            jar-name: "Debug"
          - build-type: Debug
            publish-type: "debugwithasan"
            extra-cmake-args: "-DENABLE_ASAN=ON"
            jar-name: "DebugWithAsan"

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Fetch tags
      run: git fetch --tags --force
    - run: git describe --tags

    - name: Install Java 25
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: temurin

    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential default-jdk openjdk-25-jdk
        ls
        find .
        pwd
        cmake -B cmake_build -S . -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DCMAKE_INSTALL_PREFIX=cmake_build -DOPENCV_ARCH=linuxarm64 ${{ matrix.extra-cmake-args }}
        cmake --build cmake_build --target install -- -j 4

    - run: find .


    - run: |
        ./gradlew build ${{ (startsWith(github.event_name, 'push') && 'publish') || '' }} -PArchOverride=linuxarm64 -PPublishType=${{ matrix.publish-type }} -x check
      env:
        ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}

    - uses: actions/upload-artifact@v4
      name: Upload jar
      with:
        name: librubik-jar-pi-${{matrix.jar-name}}
        path: ${{ github.workspace }}/build/libs/*.jar
    - uses: actions/upload-artifact@v4
      with:
        name: librubik-${{ matrix.jar-name }}
        path: cmake_build/*.so
