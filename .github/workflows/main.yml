name: Build rubik_java

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v4
  build:
    needs: [validation]
    strategy:
      fail-fast: false
      matrix:
        include:
          - build-type: Release
            publish-type: ""
            extra-cmake-args: ""
            jar-name: "ReleaseArm64"
            os: ubuntu-24.04-arm
            platform: "linuxarm64"
          - build-type: Debug
            publish-type: "debug"
            extra-cmake-args: ""
            jar-name: "DebugArm64"
            os: ubuntu-24.04-arm
            platform: "linuxarm64"
          - build-type: Debug
            publish-type: "debugwithasan"
            extra-cmake-args: "-DENABLE_ASAN=ON"
            jar-name: "DebugWithAsanArm64"
            os: ubuntu-24.04-arm
            platform: "linuxarm64"
          - build-type: Release
            publish-type: ""
            extra-cmake-args: ""
            jar-name: "ReleaseX64"
            os: ubuntu-24.04
            platform: "linuxx86-64"
          - build-type: Debug
            publish-type: "debug"
            extra-cmake-args: ""
            jar-name: "DebugX64"
            os: ubuntu-24.04
            platform: "linuxx86-64"
          - build-type: Debug
            publish-type: "debugwithasan"
            extra-cmake-args: "-DENABLE_ASAN=ON"
            jar-name: "DebugWithAsanX64"
            os: ubuntu-24.04
            platform: "linuxx86-64"

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Fetch tags
      run: git fetch --tags --force
    - run: git describe --tags

    - name: Install Java 25
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: temurin

    - name: Install sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential default-jdk openjdk-25-jdk ninja-build

    - name: Build native code
      run: |
        cmake --preset with-sccache -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DOPENCV_ARCH=${{ matrix.platform }} ${{ matrix.extra-cmake-args }}
        cmake --build cmake_build --target install -- -j 4

    - name: Build and Test Java
      run: ./gradlew build

    - name: Publish
      run: |
        ./gradlew build ${{ (startsWith(github.event_name, 'push') && 'publish') || '' }} -PArchOverride=${{ matrix.platform }} -PPublishType=${{ matrix.publish-type }} -x check
      env:
        ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}

    - uses: actions/upload-artifact@v4
      name: Upload jar
      with:
        name: librubik-jar-pi-${{ matrix.build-type }}-${{ matrix.platform }}
        path: ${{ github.workspace }}/build/libs/*.jar
    - uses: actions/upload-artifact@v4
      with:
        name: librubik-${{ matrix.jar-name }}
        path: cmake_build/*.so
