name: Build tflite_java

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
  build:
    needs: [validation]
    strategy:
      fail-fast: false
      matrix:
        include:
          - build-type: Release
            os: ubuntu-24.04-arm
            platform: "linuxarm64"
          - build-type: Debug
            os: ubuntu-24.04-arm
            platform: "linuxarm64"
          - build-type: Asan
            os: ubuntu-24.04-arm
            platform: "linuxarm64"
          - build-type: Ubsan
            os: ubuntu-24.04-arm
            platform: "linuxarm64"
          - build-type: Tsan
            os: ubuntu-24.04-arm
            platform: "linuxarm64"
          - build-type: Release
            os: ubuntu-24.04
            platform: "linuxx86-64"
          - build-type: Debug
            os: ubuntu-24.04
            platform: "linuxx86-64"
          - build-type: Asan
            os: ubuntu-24.04
            platform: "linuxx86-64"
          - build-type: Ubsan
            os: ubuntu-24.04
            platform: "linuxx86-64"
          - build-type: Tsan
            os: ubuntu-24.04
            platform: "linuxx86-64"

    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Fetch tags
      run: git fetch --tags --force
    - run: git describe --tags

    - name: Install Java 25
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: temurin

    - name: Install sccache
      uses: mozilla-actions/sccache-action@v0.0.10

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential default-jdk openjdk-25-jdk ninja-build libasan8

    - name: Build native code
      run: |
        cmake --preset with-sccache -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DOPENCV_ARCH=${{ matrix.platform }}
        cmake --build cmake_build --target install -- -j 4

    - name: Build and Test Java
      run: ./gradlew build

    - name: Publish
      if: matrix.build-type  == 'Release'
      run: |
        ./gradlew build ${{ (startsWith(github.event_name, 'push') && 'publish') || '' }} -PArchOverride=${{ matrix.platform }} -PPublishType=${{ matrix.build-type != 'Release' && matrix.build-type || '' }} -x check
      env:
        ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}

    - uses: actions/upload-artifact@v7
      name: Upload jar
      with:
        name: libtflite-jar-pi-${{ matrix.build-type }}-${{ matrix.platform }}
        path: ${{ github.workspace }}/build/libs/*.jar
    - uses: actions/upload-artifact@v7
      with:
        name: libtflite-${{ matrix.build-type }}-${{ matrix.platform }}
        path: cmake_build/*.so
    - uses: actions/upload-artifact@v7
      name: Upload test output image
      with:
        name: test_outputs-${{ matrix.build-type }}-${{ matrix.platform }}

        path: src/test/resources/images/*_with_results.jpg

  matrix-checker:
    # This job always runs last to set the overall result based on the matrix jobs. If any matrix job failed, this job will fail.
    # This makes it so that we don't need to add each matrix job individually to CI checks.
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - run: ${{!contains(needs.*.result, 'failure')}}
